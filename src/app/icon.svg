<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8601A" />
      <stop offset="100%" stop-color="#C94F10" />
    </linearGradient>
  </defs>

  <!-- Background Base -->
  <rect width="128" height="128" rx="28" fill="url(#brandGradient)" />

  <!-- Compass / Star Elements -->
  <g stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none" transform="translate(64, 64)">
    <circle cx="0" cy="0" r="34" stroke-width="8" opacity="0.9" />
    <!-- Compass Arrows -->
    <path d="M 0 -44 L 0 -24" />
    <path d="M 0 24 L 0 44" />
    <path d="M -44 0 L -24 0" />
    <path d="M 24 0 L 44 0" />
    <!-- Diagonal Arrows -->
    <path d="M -30 -30 L -18 -18" stroke-width="6" opacity="0.7" />
    <path d="M 30 30 L 18 18" stroke-width="6" opacity="0.7" />
    <path d="M -30 30 L -18 18" stroke-width="6" opacity="0.7" />
    <path d="M 30 -30 L 18 -18" stroke-width="6" opacity="0.7" />
    <!-- Center Dot -->
    <circle cx="0" cy="0" r="6" fill="#FFFFFF" stroke="none" />
  </g>
</svg>
